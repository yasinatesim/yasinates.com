[build]
  command = "npm run build:micro-apps && npm run build"
  publish = ".output/public"

[build.environment]
  NODE_VERSION = "20"
  NODE_ENV = "production"

# Serve micro app bundles as static files from public/micro-apps/
# These are copied into .output/public by Vinxi during `npm run build`
[[headers]]
  for = "/micro-apps/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"

# SSR function — TanStack Start (Vinxi) handles this automatically
# Netlify detects the .output/server directory and deploys it as a serverless function
